[rf]
freq_offset = 0
tx_gain = 50
rx_gain = 40
srate = 11.52e6
nof_antennas = 1
device_name = zmq
# ★주의: 아래 줄에 id=ue 를 반드시 넣어야 ZMQ 에러가 안 납니다!
device_args = tx_port=tcp://127.0.0.1:2001,rx_port=tcp://127.0.0.1:2000,id=ue,base_srate=11.52e6

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1

[pcap]
enable = none

[log]
all_level = info
filename = /tmp/ue.log

[usim]
mode = soft
algo = milenage
opc= 63BFA50EE6523365FF14C1F45F88737D
k= 00112233445566778899aabbccddeeff
imsi = 001010123456780
imei = 353490069873319

[rrc]
release = 15
ue_category = 4

[nas]
apn = srsapn
apn_protocol = ipv4

[gw]
# ★핵심: 아까 만든 가상 네트워크 방(ue1)으로 트래픽을 보냅니다.
netns = ue1
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false
